[rewrite_local]
# 爱思助手 开屏广告
^https?:\/\/.*\.i4\.cn\/api\/(ad|advert|opening|launch) url reject
^https?:\/\/ad\.i4\.cn\/.* url reject
^https?:\/\/.*\.i4\.cn\/.*launch.* url reject
^https?:\/\/api\.i4\.cn\/v1\/ad url reject
^https?:\/\/api\.i4\.cn\/common\/launch url reject

[mitm]
hostname = *.i4.cn
