; hostname = app.dsx.ac

# 1. 过滤配置列表 (兼容 HTTP/HTTPS)
; ^https?:\/\/[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+){1,4}(:\d+)?\/api\/v\d\/config\/getConfigList\.do url jsonjq-response-body '.data |= map(select(.keyName | test("config\\.(ad|search|recommend)") | not))'

# 2. 拦截版本/公告/广告 (兼容 HTTP/HTTPS)
; ^https?:\/\/[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+){1,4}(:\d+)?\/.*?\/v\d\/(version|notice\?|top_notice\?|advert\?position=[^2]+) url reject-200


hostname = app.dsx.ac

# ================= 大师兄影视去广告 (完整版) =================

# 1. [juzhi] 过滤配置列表中的广告/搜索/推荐项
# 逻辑：移除 keyName 中包含 config.ad, config.search, config.recommend 的项
^https?:\/\/[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+){1,4}(:\d+)?\/api\/v\d\/config\/getConfigList\.do url jsonjq-response-body '.data |= map(select(.keyName | test("config\\.(ad|search|recommend)") | not))'

# 2. [common] 拦截版本更新、公告及特定广告位
# 逻辑：直接拒绝请求 (返回空内容)，针对 version, notice, top_notice 以及 position 不为 2 的 advert
^https?:\/\/[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+){1,4}(:\d+)?\/.*?\/v\d\/(version|notice\?|top_notice\?|advert\?position=[^2]+) url reject-200

# 3. [logs] 处理首页/日志接口的横幅和置顶内容
# 逻辑：删除 .data.banners 字段；如果存在 .data.is_top 则清空整个 data 数据
^https?:\/\/app\.dsx\.ac\/ndsx\.php\/v\d\/logs url jsonjq-response-body 'del(.data.banners) | if .data.is_top then .data = [] else . end'